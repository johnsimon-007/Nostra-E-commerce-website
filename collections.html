<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav-container">
        <h2 class="heading">NOSTRA</h2>
        <ul class="nav-link">
            <li><a href="index.html">Home</a></li>
            <li><a href="collections.html">New Arrivals</a></li>
            <li><a href="collections.html">Collections</a></li>
            <li><a href="contact.html">Contact Us</a></li> 
        </ul>
        <div class="menuIcon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M3 6h18M3 12h18M3 18h18" stroke="black" stroke-width="2" />
            </svg>
        </div>
    </nav>
    <section>
        <input type="text" id="search" placeholder="Search products">

<select id="filter">
  <option value="">All</option>
  <option value="men">Men</option>
  <option value="women">Women</option>
</select>

<div id="products"></div>
    </section>

<script>
const products = [
  { name: "Shirt", category: "men", price: 500 ,image:"./images/shirt.jpg"},
  { name: "T-shirt", category: "men", price: 300 ,image:"./images/t-shirt.jpg"},
  { name: "Shirt", category: "men", price: 500 ,image:"./images/product4.jpg"},
  { name: "T-shirt", category: "men", price: 300 ,image:"./images/product3.jpg"},
  { name: "hoodie", category: "men", price: 500 ,image:"./images/product1.jpg"},
  { name: "T-shirt", category: "men", price: 300 ,image:"./images/product2.jpg"},
  { name: "Saree", category: "women", price: 1200 ,image:"./images/saree.jpg"},
  { name: "kurti", category: "women", price: 1500 ,image:"./images/kurti.jpg"},
   { name: "kurti", category: "women", price: 1200 ,image:"./images/kurti2.jpg"},
    { name: "frock", category: "women", price: 1500 ,image:"./images/frock1.jpg"},
   { name: "frock", category: "women", price: 1200 ,image:"./images/frock2.jpg"},
  { name: "kurti", category: "women", price: 1500 ,image:"./images/kurti3.jpg"}
]
function displayProducts(data) {
  let container = document.getElementById("products")
  container.innerHTML = ""

  data.forEach(p => {
    let div = document.createElement("div")
    div.classList.add("product-card")

    div.innerHTML = `
      <img src="${p.image}" alt="${p.name}">
      <h3>${p.name}</h3>
      <p>${p.category}</p>
      <p>₹${p.price}</p>
    `

    container.appendChild(div)
  })
}
displayProducts(products)

function applyFilters() {

  let searchValue = document.getElementById("search").value.toLowerCase()
  let filterValue = document.getElementById("filter").value

  let result = products.filter(p => {

    let matchSearch = p.name.toLowerCase().includes(searchValue)

    let matchFilter = filterValue
      ? p.category === filterValue
      : true

    return matchSearch && matchFilter
  })

  displayProducts(result)
}
document.getElementById("search").addEventListener("keyup", applyFilters)
document.getElementById("filter").addEventListener("change", applyFilters)

</script>    
    
</body>
</html>
